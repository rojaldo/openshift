apiVersion: apps/v1
kind: Deployment
metadata:
 name: ejemplo-deployment
spec:
 replicas: 5
 selector:
   matchLabels:
     app: mi-aplicacion
 strategy:
   type: RollingUpdate
   rollingUpdate:
     maxSurge: 1
     maxUnavailable: 1
 progressDeadlineSeconds: 600
 revisionHistoryLimit: 10
 template:
   metadata:
     labels:
       app: mi-aplicacion
   spec:
     containers:
     - name: contenedor-de-ejemplo
       image: nginx:latest
       ports:
       - containerPort: 80
       resources:
         requests:
           cpu: 100m
           memory: 128Mi
         limits:
           cpu: 500m
           memory: 512Mi

---
# HorizontalPodAutoscaler: autoescalado basado en CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ejemplo-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ejemplo-deployment
  minReplicas: 5
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
